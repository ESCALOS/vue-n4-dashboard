# =============================================================================
#  nginx/frontend.conf  — sin cambios respecto al original
#  Nginx interno del contenedor frontend (SPA Vue)
#  Solo escucha en la red Docker interna, nunca expuesto al exterior
# =============================================================================

server {
    listen      8080;
    listen      [::]:8080;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # SPA: cualquier ruta que no exista en disco → index.html (Vue Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Caché agresiva para assets con hash en el nombre (generados por Vite)
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        access_log  off;
    }

    # No cachear el index.html (para que los deploys lleguen inmediatamente)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        expires 0;
    }

    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
