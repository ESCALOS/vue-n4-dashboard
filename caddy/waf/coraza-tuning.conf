# =============================================================================
#  coraza-tuning.conf
#  Ajustes sobre el OWASP CRS v4 para:
#    - SPA Vue (body JSON, tokens JWT, WebSocket handshake)
#    - API NestJS (Content-Type application/json, payloads grandes)
# =============================================================================

# ── Límites de body ───────────────────────────────────────────────────────────
# 10 MB para uploads; 1 MB para JSON sin archivos
SecRequestBodyLimit 10485760
SecRequestBodyNoFilesLimit 1048576
SecResponseBodyLimit 10485760
SecResponseBodyMimeType text/plain text/html text/xml application/json application/javascript

# ── Motor y logging ───────────────────────────────────────────────────────────
SecAuditEngine RelevantOnly
SecAuditLogParts ABCFHZ

# ── Umbrales de anomaly scoring ───────────────────────────────────────────────
# Inbound: bloquear si score acumulado >= 10 (arrancar conservador en prod)
# Bajar a 5 cuando confirmes 0 falsos positivos durante una semana
SecAction \
    "id:900110,phase:1,pass,nolog,\
     setvar:tx.inbound_anomaly_score_threshold=10"

# Outbound: bloquear si score >= 4
SecAction \
    "id:900120,phase:1,pass,nolog,\
     setvar:tx.outbound_anomaly_score_threshold=4"

# ── Permitir cabecera Authorization con JWT Bearer ────────────────────────────
SecRule REQUEST_HEADERS:Authorization \
    "@rx ^Bearer\s+[A-Za-z0-9\-_\.]+$" \
    "id:1010,phase:1,pass,nolog,\
     ctl:ruleRemoveTargetById=942100;REQUEST_HEADERS:Authorization"

# ── Excepciones para /api (NestJS JSON API) ───────────────────────────────────

# 1. Content-Type application/json no debe disparar 920240
SecRule REQUEST_URI "@beginsWith /api/" \
    "id:1020,phase:1,pass,nolog,\
     ctl:ruleRemoveById=920240"

# 2. Body JSON con caracteres especiales puede disparar SQLi/XSS en CRS;
#    permitir hasta score 15 en /api para evitar falsos positivos iniciales
SecRule REQUEST_URI "@beginsWith /api/" \
    "id:1021,phase:1,pass,nolog,\
     setvar:tx.inbound_anomaly_score_threshold=15"

# 3. Evitar falsos positivos en ARGS para endpoints JSON típicos de NestJS
SecRule REQUEST_URI "@beginsWith /api/" \
    "id:1022,phase:2,pass,nolog,\
     ctl:ruleRemoveTargetById=942190;ARGS,\
     ctl:ruleRemoveTargetById=942200;ARGS,\
     ctl:ruleRemoveTargetById=942260;ARGS,\
     ctl:ruleRemoveTargetById=942430;ARGS"

# ── WebSocket upgrade (Vue hot-reload — SOLO en staging, no en prod) ──────────
# Descomenta si necesitas WS en producción (p.ej. notificaciones en tiempo real)
# SecRule REQUEST_HEADERS:Upgrade "@rx ^[Ww]eb[Ss]ocket$" \
#     "id:1030,phase:1,pass,nolog,\
#      ctl:ruleRemoveById=920300"

# ── IPs de confianza internas (monitoring, health checks) ─────────────────────
# Ajusta el rango a tu red corporativa si tienes Prometheus/Grafana internos
