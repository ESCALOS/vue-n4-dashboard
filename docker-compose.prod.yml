services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    expose:
      - "8080"

  nginx:
    image: nginx:1.27-alpine
    container_name: n4-frontend-proxy
    depends_on:
      - frontend
    restart: unless-stopped
    environment:
      - BACKEND_UPSTREAM=${BACKEND_UPSTREAM:-http://host.docker.internal:3000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "80:80"
    volumes:
      - ./nginx/reverse-proxy.conf.template:/etc/nginx/templates/default.conf.template:ro
