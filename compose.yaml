services:
 
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    expose:
      - "8080"
    networks:
      - internal
 
  caddy:
    build:
      context: ./caddy
      dockerfile: Dockerfile
    container_name: waf-caddy
    depends_on:
      - frontend
    restart: unless-stopped
    ports:
      - "8060:8060"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/waf/coraza-main.conf:/etc/caddy/waf/coraza-main.conf:ro
      - ./caddy/waf/coraza-tuning.conf:/etc/caddy/waf/coraza-tuning.conf:ro
      - ./caddy/certs:/etc/caddy/certs:ro
      - caddy_logs:/var/log/caddy
      - caddy_data:/data
    networks:
      - internal
 
volumes:
  caddy_logs:
  caddy_data:
 
networks:
  internal:
    driver: bridge
 